<!DOCTYPE html>

<html>
<head>
<style>
body {
    margin:0;
    display:flex;
    font-family: Arial;
    background: linear-gradient(135deg, #1e1f25, #2b2d38);
    color:white;
}

/* GLASS */
.glass {
background: rgba(255,255,255,0.05);
backdrop-filter: blur(10px);
border: 1px solid rgba(255,255,255,0.1);
}

/* Sidebar */
.sidebar {
width: 260px;
padding: 10px;
}

/* Main */
.main {
flex: 1;
display: flex;
flex-direction: column;
height: 100vh;
}

/* Messages */
.messages {
flex: 1;
overflow-y: auto;
padding: 20px;
}

/* Input */
.input-area {
display: flex;
padding: 10px;
gap: 10px;
}

input {
flex:1;
padding:12px;
border:none;
border-radius:8px;
outline:none;
background: rgba(255,255,255,0.08);
color:white;
}

button {
padding:12px;
border:none;
border-radius:8px;
background:#19c37d;
color:white;
cursor:pointer;
}

/* Messages */
.message {
margin:10px 0;
padding:12px;
border-radius:10px;
max-width:60%;
}

.user {
background:#0b93f6;
align-self:flex-end;
}

.assistant {
    background: rgba(255,255,255,0.08);
    align-self: flex-start;
}

/* Sidebar items */
.chat-item {
padding:8px;
margin:5px 0;
cursor:pointer;
border-radius:5px;
}

.chat-item:hover {
background: rgba(255,255,255,0.1);
} </style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar glass">
    <button onclick="newChat()">+ New Chat</button>
    <div id="chatList"></div>
</div>

<!-- Main -->

<div class="main">

```
<div class="messages glass" id="messages"></div>

<div class="input-area glass">
    <input id="msg" placeholder="Type your message...">
    <button onclick="send()">Send</button>
</div>
```

</div>

<script>
let currentChat = Date.now().toString();

/* SEND MESSAGE */
async function send() {
    let input = document.getElementById("msg");
    let msg = input.value;

    if (!msg.trim()) return;

    addMessage(msg, "user");
    input.value = "";

    let typing = addMessage("Typing...", "bot");

    try {
        let res = await fetch("/chat", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                message: msg,
                chat_id: currentChat
            })
        });

        let data = await res.json();

        typing.remove();
        addMessage(data.reply, "assistant");;

    } catch (err) {
        typing.remove();
        addMessage("Server error", "bot");
        console.error(err);
    }

    loadChats();
}

/* ADD MESSAGE */
function addMessage(text, type){
    let div = document.createElement("div");
    div.className = "message " + type;
    div.innerText = text;

    document.getElementById("messages").appendChild(div);

    document.getElementById("messages").scrollTop =
        document.getElementById("messages").scrollHeight;

    return div;
}

/* LOAD CHAT LIST */
async function loadChats(){
    let res = await fetch("/chats");
    let chats = await res.json();

    let list = document.getElementById("chatList");
    list.innerHTML = "";

    chats.forEach(chat=>{
        let div = document.createElement("div");
        div.className = "chat-item";

        div.innerText = "💬 " + chat.title;

        div.onclick = ()=>switchChat(chat.id);

        list.appendChild(div);
    });
}
/* SWITCH CHAT */
async function switchChat(id){
    currentChat = id;
    document.getElementById("messages").innerHTML = "";

    try {
        let res = await fetch("/load_chat", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({chat_id: id})
        });

        let messages = await res.json();

        messages.forEach(m => {
            addMessage(m.content, m.role === "user" ? "user" : "bot");
        });

    } catch(err) {
        console.error(err);
    }
}

/* NEW CHAT */
function newChat(){
    currentChat = Date.now().toString();
    document.getElementById("messages").innerHTML = "";
}

/* ENTER KEY */
document.getElementById("msg").addEventListener("keypress", function(e){
    if(e.key === "Enter") send();
});

/* INIT */
loadChats();
</script>

</body>
</html>
